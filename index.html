<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search For Cattles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-logo">🐮</div>
    <h1>Search For Cattles</h1>
    <span class="header-ver">v1.0</span>
  </div>

  <!-- Toolbar -->
  <div class="toolbar panel">
    <!-- Board config -->
    <div class="toolbar-group">
      <label>棋盘边长</label>
      <input type="number" class="input-n" id="input-n" min="4" max="15" value="5">
      <button class="btn btn-primary" id="btn-generate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        生成棋盘
      </button>
    </div>

    <!-- Colors -->
    <div class="toolbar-group">
      <span class="swatch-label">颜色</span>
      <div class="swatches" id="swatches"></div>
    </div>

    <!-- Tools -->
    <div class="toolbar-group">
      <button class="btn btn-muted" id="btn-erase">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14 2.2c.8-.8 2-.8 2.8 0L20 5.5c.8.8.8 2 0 2.8L9.3 19"/><line x1="18" y1="12" x2="12" y2="18"/></svg>
        擦除
      </button>
    </div>

    <span class="toolbar-spacer"></span>

    <!-- Actions -->
    <div class="toolbar-group">
      <button class="btn btn-ghost" id="btn-validate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
        验证拼图
      </button>
      <button class="btn btn-success" id="btn-solve" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        求解
      </button>
      <button class="btn btn-danger" id="btn-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        清空
      </button>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <span class="canvas-hint" id="canvas-hint">左键拖拽涂色 · 滚轮切换颜色</span>
  </div>

  <!-- Message -->
  <div class="message message-default" id="message">输入 n 并点击「生成棋盘」开始</div>
</div>

<script src="js/state.js"></script>
<script src="js/renderer.js"></script>
<script src="js/swatches.js"></script>
<script src="js/auto-process.js"></script>
<script src="js/interaction.js"></script>
<script src="js/validator.js"></script>
<script src="js/solver.js"></script>
<script src="js/main.js"></script>
</body>
</html>
