<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Search For Cattles</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<div id="app">
		<!-- Header -->
		<div class="header">
			<div class="header-logo">🐮</div>
			<h1>Search For Cattles</h1>
			<span class="header-ver">v1.1.0</span>
		</div>

		<!-- Toolbar -->
		<div class="toolbar panel">
			<!-- Board config -->
			<div class="toolbar-group">
				<label>棋盘边长</label>
				<input type="number" class="input-n" id="input-n" min="4" max="15" value="5">
				<button class="btn btn-primary" id="btn-generate">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
						stroke-linejoin="round">
						<rect x="3" y="3" width="18" height="18" rx="2" />
						<line x1="12" y1="8" x2="12" y2="16" />
						<line x1="8" y1="12" x2="16" y2="12" />
					</svg>
					生成棋盘
				</button>
			</div>

			<!-- Colors -->
			<div class="toolbar-group">
				<span class="swatch-label">颜色</span>
				<div class="swatches" id="swatches"></div>
			</div>

			<!-- Tools -->
			<div class="toolbar-group">
				<button class="btn btn-muted" id="btn-erase">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
						stroke-linejoin="round">
						<path
							d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14 2.2c.8-.8 2-.8 2.8 0L20 5.5c.8.8.8 2 0 2.8L9.3 19" />
						<line x1="18" y1="12" x2="12" y2="18" />
					</svg>
					擦除
				</button>
			</div>

			<span class="toolbar-spacer"></span>

			<!-- Actions -->
			<div class="toolbar-group">
				<button class="btn btn-ghost" id="btn-validate">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
						stroke-linejoin="round">
						<circle cx="12" cy="12" r="10" />
						<polyline points="8 12 11 15 16 9" />
					</svg>
					验证拼图
				</button>
				<button class="btn btn-success" id="btn-solve" disabled>
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
						stroke-linejoin="round">
						<polygon points="5 3 19 12 5 21 5 3" />
					</svg>
					求解
				</button>
				<button class="btn btn-danger" id="btn-clear">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
						stroke-linejoin="round">
						<circle cx="12" cy="12" r="10" />
						<line x1="15" y1="9" x2="9" y2="15" />
						<line x1="9" y1="9" x2="15" y2="15" />
					</svg>
					清空
				</button>
			</div>
		</div>

		<!-- Board -->
		<div class="board-wrap">
			<canvas id="board"></canvas>
			<span class="canvas-hint" id="canvas-hint">左键拖拽涂色 · 滚轮切换颜色</span>
		</div>

		<!-- Message -->
		<div class="message message-default" id="message">输入 n 并点击「生成棋盘」开始</div>

		<!-- Footer -->
		<div class="footer">
			<img class="footer-avatar" src="https://github.com/aexabr.png" alt="AEXABR" width="20" height="20">
			<span>Created by <a href="https://github.com/aexabr" target="_blank" rel="noopener">AEXABR</a></span>
			<span class="footer-dot">·</span>
			<a href="https://github.com/aexabr/Search_For_Cattles" target="_blank" rel="noopener" title="GitHub 仓库">
				<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
					<path
						d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
				</svg>
			</a>
		</div>
	</div>

	<script src="js/state.js"></script>
	<script src="js/renderer.js"></script>
	<script src="js/swatches.js"></script>
	<script src="js/auto-process.js"></script>
	<script src="js/interaction.js"></script>
	<script src="js/validator.js"></script>
	<script src="js/solver.js"></script>
	<script src="js/main.js"></script>
</body>

</html>
